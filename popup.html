<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Link Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>Link Vault</h1>
      <p class="subtitle">Stored only on this machine.</p>
    </div>
    <button id="view-all-btn" class="view-all-btn">View all →</button>
  </header>

  <form id="capture-form" class="capture-form">
    <div class="field">
      <label for="title">Title</label>
      <input type="text" id="title" required />
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="url" id="url" required />
    </div>
    <div class="row">
      <div class="field">
        <label for="topic">Topic</label>
        <input type="text" id="topic" list="topic-options" placeholder="e.g. ACR 2026" required />
        <datalist id="topic-options"></datalist>
      </div>
      <div class="field">
        <label>When it matters</label>
        <div class="toggle-group" id="time-toggle">
          <button type="button" class="toggle-btn timely active" data-value="timely">Timely</button>
          <button type="button" class="toggle-btn timeless" data-value="timeless">Timeless</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label for="note">Note (optional)</label>
      <textarea id="note" rows="2" placeholder="Why this matters, in a few words"></textarea>
    </div>
    <button type="submit" class="save-btn">Save link</button>
  </form>

  <div class="filters">
    <select id="filter-topic">
      <option value="all">All topics</option>
    </select>
    <select id="filter-time">
      <option value="all">All</option>
      <option value="timely">Timely only</option>
      <option value="timeless">Timeless only</option>
    </select>
    <button id="export-btn" class="export-btn" title="Download all links as JSON">Export</button>
  </div>

  <ul id="link-list" class="link-list"></ul>
  <p id="more-note" class="more-note" hidden></p>
  <p id="empty-state" class="empty-state" hidden>Nothing saved yet. Capture a link above, or right-click any page or link and choose "Save to Link Vault."</p>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
